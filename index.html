<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskFlow — Smart To-Do</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300;12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&display=swap" rel="stylesheet">
  <!-- SortableJS — drag-and-drop reordering (free CDN, no key) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js" defer></script>
</head>
<body>

  <!-- ══════════════════════════════════════════
       TOAST CONTAINER
  ══════════════════════════════════════════ -->
  <div class="toast-wrap" id="toastWrap" aria-live="polite" aria-atomic="true"></div>

  <!-- ══════════════════════════════════════════
       MOBILE SIDEBAR OVERLAY
  ══════════════════════════════════════════ -->
  <div class="mob-overlay" id="mobOverlay"></div>

  <!-- ══════════════════════════════════════════
       ADD / EDIT TASK MODAL
  ══════════════════════════════════════════ -->
  <div class="modal-bd" id="taskBD" role="dialog" aria-modal="true" aria-labelledby="modalHeading">
    <div class="modal" id="taskModal">
      <div class="modal-hdr">
        <h2 class="modal-heading" id="modalHeading">New Task</h2>
        <button class="modal-x" id="modalX" aria-label="Close">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
      </div>

      <div class="modal-body">
        <!-- Title -->
        <div class="fg">
          <label class="fl" for="fTitle">Task <span class="req">*</span></label>
          <div class="fi-wrap">
            <input type="text" id="fTitle" class="fi" placeholder="What needs to be done?" maxlength="100" autocomplete="off">
            <span class="fi-counter" id="fCounter">0/100</span>
          </div>
        </div>

        <!-- Description -->
        <div class="fg">
          <label class="fl" for="fDesc">Notes</label>
          <textarea id="fDesc" class="fi fi-ta" placeholder="Add extra details…" rows="3" maxlength="400"></textarea>
        </div>

        <!-- Priority + Due date row -->
        <div class="fg-row">
          <div class="fg">
            <label class="fl" for="fPriority">Priority</label>
            <select id="fPriority" class="fi fi-sel">
              <option value="low">🔵 Low</option>
              <option value="medium" selected>🟡 Medium</option>
              <option value="high">🔴 High</option>
            </select>
          </div>
          <div class="fg">
            <label class="fl" for="fDue">Due Date</label>
            <input type="date" id="fDue" class="fi">
          </div>
        </div>

        <!-- List selector -->
        <div class="fg">
          <label class="fl" for="fList">List</label>
          <select id="fList" class="fi fi-sel">
            <!-- populated by JS -->
          </select>
        </div>

        <!-- Tags -->
        <div class="fg">
          <label class="fl">Tags <span class="fl-hint">(press Enter to add)</span></label>
          <input type="text" id="fTag" class="fi" placeholder="Type a tag and press Enter…" autocomplete="off">
          <div class="tags-row" id="fTagsRow"></div>
        </div>
      </div>

      <div class="modal-ftr">
        <button class="btn btn-ghost" id="cancelTask">Cancel</button>
        <button class="btn btn-primary" id="saveTask">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12l5 5L20 7"/></svg>
          <span id="saveTaskLbl">Save Task</span>
        </button>
      </div>
    </div>
  </div>

  <!-- ══════════════════════════════════════════
       DELETE CONFIRM MODAL
  ══════════════════════════════════════════ -->
  <div class="modal-bd" id="delBD">
    <div class="modal modal-sm">
      <div class="modal-body tc">
        <div class="del-ico">🗑️</div>
        <h3 class="del-title">Delete this task?</h3>
        <p class="del-sub">This cannot be undone.</p>
      </div>
      <div class="modal-ftr">
        <button class="btn btn-ghost" id="cancelDel">Cancel</button>
        <button class="btn btn-danger" id="confirmDel">Delete</button>
      </div>
    </div>
  </div>

  <!-- ══════════════════════════════════════════
       MAIN APPLICATION SHELL
  ══════════════════════════════════════════ -->
  <div class="shell">

    <!-- ── SIDEBAR ─────────────────────────────── -->
    <aside class="sidebar" id="sidebar">

      <!-- Brand -->
      <div class="brand">
        <div class="brand-logo">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
        </div>
        <span class="brand-name">TaskFlow</span>
        <button class="sb-close" id="sbClose" aria-label="Close sidebar">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
      </div>

      <!-- New Task shortcut -->
      <button class="sb-new-btn" id="sbNewBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
        New Task
      </button>

      <!-- Static views -->
      <nav class="sb-nav" aria-label="Task views">
        <p class="sb-section">Views</p>
        <ul class="sb-list">
          <li><button class="sb-item active" data-view="all">
            <span class="sb-ico">📋</span><span>All Tasks</span>
            <span class="sb-badge" id="bAll">0</span>
          </button></li>
          <li><button class="sb-item" data-view="today">
            <span class="sb-ico">🗓️</span><span>Today</span>
            <span class="sb-badge" id="bToday">0</span>
          </button></li>
          <li><button class="sb-item" data-view="upcoming">
            <span class="sb-ico">🔜</span><span>Upcoming</span>
            <span class="sb-badge" id="bUpcoming">0</span>
          </button></li>
          <li><button class="sb-item" data-view="starred">
            <span class="sb-ico">⭐</span><span>Starred</span>
            <span class="sb-badge" id="bStarred">0</span>
          </button></li>
          <li><button class="sb-item" data-view="done">
            <span class="sb-ico">✅</span><span>Completed</span>
            <span class="sb-badge" id="bDone">0</span>
          </button></li>
        </ul>

        <!-- Custom lists -->
        <div class="sb-section-hdr">
          <p class="sb-section">My Lists</p>
          <button class="sb-add-list" id="addListBtn" title="Add list" aria-label="Add a new list">＋</button>
        </div>
        <ul class="sb-list" id="listsNav"><!-- JS --></ul>
      </nav>

      <!-- Progress ring area -->
      <div class="sb-progress">
        <div class="sp-ring-wrap">
          <svg class="sp-ring" viewBox="0 0 60 60" aria-hidden="true">
            <circle class="sp-track" cx="30" cy="30" r="24" />
            <circle class="sp-arc"   cx="30" cy="30" r="24" id="spArc"/>
          </svg>
          <span class="sp-pct" id="spPct">0%</span>
        </div>
        <div class="sp-info">
          <p class="sp-label">Today's Progress</p>
          <p class="sp-detail" id="spDetail">0 of 0 done</p>
        </div>
      </div>

    </aside><!-- /.sidebar -->

    <!-- ── MAIN PANEL ─────────────────────────── -->
    <div class="main-panel">

      <!-- Topbar -->
      <header class="topbar">
        <div class="tb-left">
          <button class="ham-btn" id="hamBtn" aria-label="Open menu">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h10"/></svg>
          </button>
          <h1 class="view-title" id="viewTitle">All Tasks</h1>
        </div>
        <div class="tb-right">
          <!-- Search -->
          <div class="search-box">
            <svg class="search-ico" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
            <input type="search" id="searchInput" class="search-inp" placeholder="Search…" aria-label="Search tasks">
          </div>
          <!-- Theme toggle -->
          <button class="theme-btn" id="themeBtn" aria-label="Toggle theme">
            <span id="themeIco">🌙</span>
          </button>
        </div>
      </header>

      <!-- Stats strip -->
      <div class="stats-strip">
        <div class="stat">
          <span class="stat-n" id="stTotal">0</span>
          <span class="stat-l">Total</span>
        </div>
        <div class="stat">
          <span class="stat-n violet" id="stActive">0</span>
          <span class="stat-l">Active</span>
        </div>
        <div class="stat">
          <span class="stat-n green" id="stDone">0</span>
          <span class="stat-l">Done</span>
        </div>
        <div class="stat">
          <span class="stat-n red" id="stOver">0</span>
          <span class="stat-l">Overdue</span>
        </div>

        <div class="strip-sep"></div>

        <!-- Priority filter chips -->
        <div class="chip-group" role="group" aria-label="Filter by priority">
          <button class="chip active" data-prio="">All</button>
          <button class="chip" data-prio="high">🔴 High</button>
          <button class="chip" data-prio="medium">🟡 Medium</button>
          <button class="chip" data-prio="low">🔵 Low</button>
        </div>

        <!-- Sort -->
        <select class="sort-sel" id="sortSel" aria-label="Sort tasks">
          <option value="created">↕ Newest</option>
          <option value="due">📅 Due Date</option>
          <option value="priority">🎯 Priority</option>
          <option value="alpha">🔤 A–Z</option>
        </select>
      </div>

      <!-- Task area -->
      <main class="task-area">

        <!-- Task list (SortableJS target) -->
        <div id="taskList" class="task-list" role="list" aria-label="Task list"></div>

        <!-- Empty state -->
        <div class="empty" id="emptyState">
          <div class="empty-art" aria-hidden="true">
            <svg width="110" height="110" viewBox="0 0 110 110" fill="none">
              <circle cx="55" cy="55" r="50" fill="var(--acc-bg)"/>
              <rect x="28" y="38" width="54" height="8" rx="4" fill="var(--acc)" opacity=".25"/>
              <rect x="28" y="52" width="40" height="8" rx="4" fill="var(--acc)" opacity=".18"/>
              <rect x="28" y="66" width="48" height="8" rx="4" fill="var(--acc)" opacity=".12"/>
              <circle cx="22" cy="42" r="5" fill="var(--acc)" opacity=".35"/>
              <circle cx="22" cy="56" r="5" fill="var(--acc)" opacity=".25"/>
              <circle cx="22" cy="70" r="5" fill="var(--acc)" opacity=".18"/>
            </svg>
          </div>
          <h2 class="empty-h" id="emptyH">Nothing here yet</h2>
          <p class="empty-p" id="emptyP">Add your first task to get started</p>
          <button class="btn btn-primary" id="emptyAdd">＋ Add Task</button>
        </div>

      </main>
    </div><!-- /.main-panel -->

  </div><!-- /.shell -->

  <!-- Floating Action Button -->
  <button class="fab" id="fabBtn" aria-label="Add new task" title="Add task  (Ctrl+N)">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
  </button>

  <script src="app.js"></script>
</body>
</html>
